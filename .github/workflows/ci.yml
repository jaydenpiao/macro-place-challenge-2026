name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "infra/**"
      - "feat/**"
      - "fix/**"
  workflow_dispatch:

jobs:
  test:
    name: Python tests and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check formatting
        run: uv run --extra dev black --check submissions/jaydenpiao scripts/run_experiment.py scripts/check_results.py scripts/compare_results.py scripts/check_cloud_parity_host.py test/test_jaydenpiao_submission.py test/test_experiment_harness.py test/test_cloud_parity_preflight.py

      - name: Run tests
        run: uv run --extra dev pytest

      - name: Official evaluator smoke
        env:
          JAYDEN_SEARCH_ITERS: "200"
        run: uv run evaluate submissions/jaydenpiao/placer.py -b ibm01

      - name: Experiment harness smoke
        env:
          JAYDEN_SEARCH_ITERS: "200"
        run: |
          uv run python scripts/run_experiment.py --placer submissions/jaydenpiao/placer.py --benchmarks ibm01 --run-id ci-ibm01
          uv run python scripts/check_results.py results/ci-ibm01/summary.json --max-runtime 300 --max-avg-proxy 1.4578
